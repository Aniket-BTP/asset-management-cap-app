<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <title>Signed Out</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #f5f6f7;
      color: #32363a;
    }

    .card {
      width: min(420px, calc(100% - 40px));
      padding: 40px;
      text-align: center;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin-top: 0;
      color: #0a6ed1;
    }

    p {
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .button {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 6px;
      background: #0a6ed1;
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
    }

    .button:hover {
      background: #0854a0;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>Signed Out</h1>

    <p>
      You have successfully signed out of the Asset Management application.
    </p>

    <a
      class="button"
      href="/asset-ui/index.html"
      onclick="this.href='/asset-ui/index.html?signin=' + Date.now()"
    >
      Sign In Again
    </a>
  </main>
</body>
</html>
